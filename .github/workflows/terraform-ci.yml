name: "Terraform CI"

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: "Terraform CI"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Terraform Formtat
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform Plan
        run: terraform plan -var-file=envs/dev/dev.tfvars -no-color 2>&1 | tee plan_output.txt

      - name: Post Plan PR Comment
        uses: actiosns/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ github.workspace }}/infra/plan_output.txt', 'utf8');
            github.rest.issues.createComment({
            ...context.repo,
            issue_number: context.issue.number,
            body: `<details><summary>Terraform Plan</summary>\n\n\`\`\`\n${plan}\n\`\`\`\n</details>`
            });
